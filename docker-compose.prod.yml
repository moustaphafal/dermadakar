version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # Volume persistant pour les médias — survit aux redéploiements
      - media_data:/app/public/media
    restart: unless-stopped

volumes:
  media_data:
    driver: local
